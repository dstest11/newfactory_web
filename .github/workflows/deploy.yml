# =============================================================================
# Deploy workflow — Phase C webhook trigger (matches dstest11/koupelnystefl_web,
# stavsys, crmechoz et al.). The infra droplet runs `webhook` on
# deploy.dosmart.world; this workflow signs a {app, sha, env} payload with
# HMAC-SHA256 and POSTs it to /hooks/deploy-app. The webhook script on the
# droplet (webhook/scripts/deploy-app.sh) handles the rest: vendor artifact
# extract via the webhook_deploy container (which has aws-cli baked in),
# cache:clear, php-fpm reload, healthcheck.
#
# Trigger model (Phase 3, release gates production):
#   push to master   → staging deploy   (apps-staging/, basic-auth-gated)
#   release published → production deploy (apps-prod/, public)
# =============================================================================
name: Deploy newfactory_web to DigitalOcean

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        options: [staging, production]
        default: staging

jobs:
  # Phase B (composer-in-CI): build vendor artifact on a 4 vCPU GH runner,
  # upload to s3://dosmart-fra1/deploy-artifacts/newfactory_web/.
  build-vendor:
    name: Build vendor artifact
    uses: ./.github/workflows/build-vendor.yml
    secrets:
      SPACES_ACCESS_KEY: ${{ secrets.SPACES_ACCESS_KEY }}
      SPACES_SECRET_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

  deploy:
    name: Deploy newfactory_web (${{ (github.event_name == 'release' || inputs.target == 'production') && 'production' || 'staging' }})
    needs: build-vendor
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-newfactory_web-${{ (github.event_name == 'release' || inputs.target == 'production') && 'production' || 'staging' }}
      cancel-in-progress: true

    steps:
      - name: Compute deploy env
        id: targets
        run: |
          if [[ "${{ github.event_name }}" == "release" ]] || [[ "${{ inputs.target }}" == "production" ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy via webhook
        env:
          HMAC: ${{ secrets.WEBHOOK_HMAC_SECRET }}
          APP: newfactory_web
          SHA: ${{ github.sha }}
          DEPLOY_ENV: ${{ steps.targets.outputs.env }}
        run: |
          PAYLOAD=$(jq -nc \
              --arg app "$APP" \
              --arg sha "$SHA" \
              --arg env "$DEPLOY_ENV" \
              '{app: $app, sha: $sha, env: $env}')
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$HMAC" | awk '{print $2}')"

          echo "Triggering deploy: app=$APP env=$DEPLOY_ENV sha=$SHA"
          # -k tolerates Let's Encrypt outage / self-signed fallback (HMAC still
          # authenticates the payload). Same pattern as live apps.
          curl -fsS -k --max-time 600 -X POST \
              https://deploy.dosmart.world/hooks/deploy-app \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: $SIG" \
              -d "$PAYLOAD"
