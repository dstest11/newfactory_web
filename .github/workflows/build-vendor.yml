name: Build vendor artifact

# Phase B of the deploy refactor (see infra
# docker-compose-for-do-droplet/docs/DEPLOYMENT_STRATEGY.md). Runs
# `composer install --no-dev` in a PHP 8.3 GH Actions runner (4 vCPU /
# 16 GB), tarballs vendor/ + public/build/ + public/bundles/, and uploads
# to DigitalOcean Spaces (`dosmart-fra1` bucket, prefix
# `deploy-artifacts/<app>/vendor-<sha>.tar.gz`).
#
# The infra-side `scripts/extract-vendor-artifact.sh` on the droplet
# downloads + verifies + atomically swaps the artifact during deploy,
# replacing the old "docker exec ... composer install" step that used
# to OOM-kill on a 2 GB box.
#
# Triggers: every push to main/master + every release. The deploy
# workflow waits for this to succeed before SSHing the droplet.
#
# Required GH Secrets in the app repo:
#   SPACES_ACCESS_KEY     (DO Spaces access key for dosmart-fra1)
#   SPACES_SECRET_KEY     (DO Spaces secret key)
#
# Optional secrets:
#   COMPOSER_AUTH         (JSON blob if any composer dep is private — see Symfony docs)

on:
  # Reusable workflow — called from deploy.yml via `uses:`. Triggers
  # only on workflow_call + workflow_dispatch (manual rebuild). Direct
  # push/release triggers live on deploy.yml which calls this.
  workflow_call:
    inputs:
      php_version:
        description: "PHP version to use for composer install (must match nginx-fpm-shared runtime — currently 8.3)"
        required: false
        default: "8.3"
        type: string
      php_extensions:
        description: "Comma-separated PHP extensions list (must match the runtime baked into nginx-fpm-shared)"
        required: false
        default: "pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, mbstring, xml, intl, gd, zip, gmp, bcmath"
        type: string
    outputs:
      artifact_sha:
        description: "Commit SHA of the built artifact"
        value: ${{ jobs.build.outputs.sha }}
    secrets:
      SPACES_ACCESS_KEY:
        required: true
      SPACES_SECRET_KEY:
        required: true
      COMPOSER_AUTH:
        required: false
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP version override (default 8.3)"
        required: false
        default: "8.3"
        type: string

# Concurrency: cancel in-progress build-vendor runs for the same ref
# when a new commit lands. We don't cancel by-SHA because every SHA
# produces a distinct artifact (vendor-<sha>.tar.gz) and we only want
# the latest SHA's artifact uploaded to Spaces. Saves CI minutes +
# avoids piling up never-deployed tarballs.
concurrency:
  group: build-vendor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build vendor + assets, upload to Spaces
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # Setup-php compiles + downloads PHP extensions on every cold
      # cache miss (~30-60s on a fresh runner). cache-extensions stores
      # the compiled .so files keyed by (PHP version + extension list +
      # PHP_EXTENSIONS_HASH from upstream cache repo) so repeated runs
      # restore instead of recompile. Quality-of-life from
      # /acc:ci-pipeline-knowledge audit.
      - name: Setup PHP extension cache key
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          key: php-extensions-cache-v1
          php-version: ${{ inputs.php_version || '8.3' }}
          extensions: ${{ inputs.php_extensions || 'pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, mbstring, xml, intl, gd, zip, gmp, bcmath' }}

      - name: Restore cached PHP extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Setup PHP ${{ inputs.php_version || '8.3' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version || '8.3' }}
          tools: composer:v2
          # Default matches the runtime extension list baked into
          # nginx-fpm-shared (see infra repo nginx_fpm_server/Dockerfile).
          # Apps with non-standard extensions can override via the
          # `php_extensions:` input on the workflow_call.
          extensions: ${{ inputs.php_extensions || 'pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, mbstring, xml, intl, gd, zip, gmp, bcmath' }}
          ini-values: memory_limit=512M

      - name: Restore composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Composer install (no-dev, optimized)
        env:
          # APP_ENV=prod prevents symfony/flex auto-scripts (which boot the
          # kernel to apply recipes) from running in dev env, which would
          # try to load DebugBundle/WebProfilerBundle/MakerBundle that
          # aren't installed in --no-dev artifact.
          APP_ENV: prod
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: |
          composer install \
            --no-dev \
            --no-scripts \
            --optimize-autoloader \
            --classmap-authoritative \
            --no-interaction \
            --prefer-dist \
            --no-progress

      # Symfony asset compile (skipped for non-Symfony apps — the asset
      # files just won't exist and the tar pattern below will skip them)
      - name: Symfony asset:install + asset-map:compile (if applicable)
        run: |
          if [[ -f bin/console ]]; then
            APP_ENV=prod php -d memory_limit=512M bin/console assets:install public --no-interaction || true
            APP_ENV=prod php -d memory_limit=512M bin/console asset-map:compile --no-interaction || true
            APP_ENV=prod php -d memory_limit=512M bin/console importmap:install --no-interaction || true
          else
            echo "No bin/console — skipping Symfony asset compile"
          fi

      - name: Tar vendor + public assets
        id: tar
        run: |
          ARTIFACT="vendor-${{ github.sha }}.tar.gz"

          # Build the include list — only paths that exist. tar with
          # missing paths errors out, so probe first.
          INCLUDE=()
          for path in vendor public/build public/bundles public/assets; do
            if [[ -d "$path" ]]; then
              INCLUDE+=("$path")
            fi
          done
          if [[ ${#INCLUDE[@]} -eq 0 ]]; then
            echo "::error::No vendor/ or public asset dirs found — composer install must have failed"
            exit 1
          fi

          tar czf "$ARTIFACT" "${INCLUDE[@]}"
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "size=$(du -sh $ARTIFACT | cut -f1)" >> "$GITHUB_OUTPUT"
          ls -la "$ARTIFACT" "${ARTIFACT}.sha256"

      - name: Upload to DO Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
          AWS_DEFAULT_REGION: fra1
          ARTIFACT: ${{ steps.tar.outputs.artifact }}
        run: |
          # newfactory_web replaced by the per-app slug when this template
          # is copied into a real app repo.
          APP_NAME="newfactory_web"
          ENDPOINT="https://fra1.digitaloceanspaces.com"
          BUCKET="dosmart-fra1"
          PREFIX="deploy-artifacts/${APP_NAME}"

          aws --endpoint-url "$ENDPOINT" s3 cp "$ARTIFACT" \
            "s3://${BUCKET}/${PREFIX}/${ARTIFACT}"
          aws --endpoint-url "$ENDPOINT" s3 cp "${ARTIFACT}.sha256" \
            "s3://${BUCKET}/${PREFIX}/${ARTIFACT}.sha256"

          echo "::notice title=Artifact uploaded::s3://${BUCKET}/${PREFIX}/${ARTIFACT} (${{ steps.tar.outputs.size }})"

      - name: Summary
        run: |
          echo "## Vendor artifact built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| App | newfactory_web |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.tar.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spaces key | deploy-artifacts/newfactory_web/vendor-${{ github.sha }}.tar.gz |" >> $GITHUB_STEP_SUMMARY
