dosmart_cms_core:
    strapi:
        base_url: '%env(NEWFACTORY_STRAPI_URL)%'
        api_token: '%env(NEWFACTORY_STRAPI_API_TOKEN)%'
        timeout: 5
    cache:
        ttl: 3600
        pool: cache.app
    editable_fields:
        # Whitelisted JSONPath fields the cms-core-bundle inline-edit overlay
        # is allowed to PATCH back to Strapi. The overlay sends `path` exactly
        # as it appears in the template's data-cms-field="<type>:<path>"
        # attribute — anything not listed here returns 403 from CmsProxyController.
        newfactory-homepage:
            - hero_eyebrow
            - hero_title_top
            - hero_title_bottom
            - hero_lead
            - benefits_title
            - benefits_lead
            - team_title
            - team_lead
            - contact_title
            - contact_lead
            # Legacy keys kept so older schemas still validate.
            - hero_title
            - hero_subtitle
            - intro_title
            - intro_body
        # Strapi v5 REST slug for the products collection is the PLURAL
        # form (`newfactory-products`). The inline-edit overlay sends that
        # exact slug in data-cms-field. The singular `newfactory-product`
        # entry below is kept only as legacy compat — new templates emit
        # the plural.
        newfactory-products:
            - name
            - manufacturer
            - algorithm
            - currency_type
            - annual_btc
            - short_description
            - long_description
        newfactory-product:
            - short_description
            - long_description
        newfactory-faq:
            - question
            - answer
        newfactory-benefit:
            - title
            - body
        newfactory-about:
            - title
            - body
        newfactory-contact-info:
            - phone
            - email
            - address
            - business_hours
            - intro
