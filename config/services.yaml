# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    newfactory.tenant: 'newfactory'
    newfactory.strapi_url: '%env(NEWFACTORY_STRAPI_URL)%'
    newfactory.strapi_api_token: '%env(NEWFACTORY_STRAPI_API_TOKEN)%'
    newfactory.lead_recipient: '%env(NEWFACTORY_LEAD_RECIPIENT)%'
    # Editor allowlist (CSV of emails) + shared bcrypt password hash.
    # Defaults keep the firewall safe (no email matches "__pending__"); real
    # values come from GH Secrets via deploy.sh::override_env_var().
    newfactory.editor_emails: '%env(default::NEWFACTORY_EDITOR_EMAILS)%'
    newfactory.editor_emails_list: '%env(csv:default::NEWFACTORY_EDITOR_EMAILS)%'
    newfactory.editor_password_hash: '%env(default::NEWFACTORY_EDITOR_PASSWORD_HASH)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # cms-core-bundle Authenticator bridge — Plan 2 Task 5 will swap this
    # for a Strapi Users-Permissions backed authenticator.
    App\Cms\Authenticator\NewfactoryAuthenticator:
        arguments:
            $tenant: '%newfactory.tenant%'

    Dosmart\Bundle\CmsCore\Authenticator\AuthenticatorInterface:
        alias: App\Cms\Authenticator\NewfactoryAuthenticator
        public: false

    # Strapi v5 read client filtered to the `newfactory` tenant.
    App\Service\StrapiContentClient:
        arguments:
            $baseUrl: '%newfactory.strapi_url%'
            $apiToken: '%newfactory.strapi_api_token%'
            $tenant: '%newfactory.tenant%'
            $cacheTtl: 300

    # ContactController — wire rate limiter + lead recipient explicitly so the
    # constructor signature stays readable.
    App\Controller\ContactController:
        arguments:
            $contactFormLimiter: '@limiter.contact_form'
            $leadRecipient: '%newfactory.lead_recipient%'

    # Editor identity provider — backed by env allowlist + bcrypt hash.
    # security.yaml references this service id directly.
    App\Cms\Security\StrapiUserProvider:
        arguments:
            $editorEmails: '%newfactory.editor_emails_list%'
            $passwordHash: '%newfactory.editor_password_hash%'

    # Rate-limit inline-edit writes per-user. Mirrors the contact_form limiter shape.
    # Reused via service id (resolved in CmsApiController if needed; cms-core-bundle's
    # CmsProxyController doesn't auto-wire this yet — keep ready for follow-up).
